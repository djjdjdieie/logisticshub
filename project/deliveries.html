<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поставки - LogisticsHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Левая боковая панель -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">📦</div>
                    <h1>LogisticsHub</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="products.html" class="nav-item">
                    <span class="nav-icon">📦</span>
                    <span>Товары</span>
                </a>
                <a href="warehouses.html" class="nav-item">
                    <span class="nav-icon">🏭</span>
                    <span>Склады</span>
                </a>
                <a href="deliveries.html" class="nav-item active">
                    <span class="nav-icon">🚚</span>
                    <span>Поставки</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>Отчеты</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>Настройки</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <p class="user-name">Администратор</p>
                        <p class="user-role">Менеджер</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="app.logout()">Выход</button>
            </div>
        </aside>

        <!-- Главная область -->
        <main class="main-content">
            <!-- Верхняя панель -->
            <header class="top-bar">
                <div class="search-container">
                    <input type="text" class="search-input" id="deliverySearch" placeholder="Поиск поставок...">
                    <span class="search-icon">🔍</span>
                </div>

                <div class="top-bar-actions">
                    <div class="current-date" id="currentDate"></div>
                </div>
            </header>

            <!-- Содержимое страницы -->
            <div class="page-content">
                <div class="page-header">
                    <h1>Управление поставками</h1>
                    <p>Отслеживание всех поставок и их статусов</p>
                </div>

                <!-- Фильтры -->
                <div class="controls-section">
                    <div class="filter-group">
                        <select id="statusFilter" class="filter-select">
                            <option value="">Все статусы</option>
                            <option value="Доставлено">Доставлено</option>
                            <option value="В пути">В пути</option>
                            <option value="Обработка">Обработка</option>
                        </select>

                        <select id="warehouseFilter" class="filter-select">
                            <option value="">Все склады</option>
                            <option value="Основной">Основной</option>
                            <option value="Резервный">Резервный</option>
                            <option value="Восточный">Восточный</option>
                            <option value="Западный">Западный</option>
                        </select>
                    </div>

                    <button class="btn btn-primary" onclick="deliveries.openAddModal()">+ Добавить поставку</button>
                </div>

                <!-- Таблица поставок -->
                <div class="table-wrapper">
                    <table class="data-table deliveries-table">
                        <thead>
                            <tr>
                                <th>Номер</th>
                                <th>Поставщик</th>
                                <th>Склад</th>
                                <th>Дата</th>
                                <th>Статус</th>
                                <th>Товаров</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="deliveriesTable">
                            <tr>
                                <td colspan="7" class="empty-state">Нет поставок</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast уведомления -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Модальное окно для добавления поставки -->
    <div class="modal" id="deliveryModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 id="deliveryModalTitle">Добавить поставку</h2>
                <button class="modal-close" onclick="app.closeModal('deliveryModal')">✕</button>
            </div>
            <form id="deliveryForm" class="form">
                <div class="form-group">
                    <label for="deliverySupplier">Поставщик *</label>
                    <input type="text" id="deliverySupplier" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="deliveryWarehouse">Склад *</label>
                        <select id="deliveryWarehouse" required>
                            <option value="">Выберите склад</option>
                            <option value="Основной">Основной</option>
                            <option value="Резервный">Резервный</option>
                            <option value="Восточный">Восточный</option>
                            <option value="Западный">Западный</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="deliveryDate">Дата поставки *</label>
                        <input type="date" id="deliveryDate" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="deliveryStatus">Статус *</label>
                        <select id="deliveryStatus" required>
                            <option value="Обработка">Обработка</option>
                            <option value="В пути">В пути</option>
                            <option value="Доставлено">Доставлено</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="deliveryQuantity">Количество товаров *</label>
                        <input type="number" id="deliveryQuantity" min="1" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="deliveryNotes">Примечания</label>
                    <textarea id="deliveryNotes" rows="3"></textarea>
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" onclick="app.closeModal('deliveryModal')">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно подтверждения -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h2 id="confirmTitle">Подтверждение</h2>
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="app.closeModal('confirmModal')">Отмена</button>
                <button class="btn btn-primary" id="confirmBtn">Подтвердить</button>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        const deliveries = {
            currentEditId: null,

            init() {
                this.render();
                document.getElementById('deliveryForm').addEventListener('submit', (e) => this.save(e));
                document.getElementById('deliverySearch').addEventListener('input', () => this.render());
                document.getElementById('statusFilter').addEventListener('change', () => this.render());
                document.getElementById('warehouseFilter').addEventListener('change', () => this.render());
            },

            openAddModal() {
                this.currentEditId = null;
                document.getElementById('deliveryForm').reset();
                document.getElementById('deliveryModalTitle').textContent = 'Добавить поставку';
                document.getElementById('deliveryDate').valueAsDate = new Date();
                app.openModal('deliveryModal');
            },

            editDelivery(id) {
                const delivery = storage.getDelivery(id);
                if (!delivery) return;

                this.currentEditId = id;
                document.getElementById('deliverySupplier').value = delivery.supplier;
                document.getElementById('deliveryWarehouse').value = delivery.warehouse;
                document.getElementById('deliveryDate').value = delivery.date;
                document.getElementById('deliveryStatus').value = delivery.status;
                document.getElementById('deliveryQuantity').value = delivery.quantity;
                document.getElementById('deliveryNotes').value = delivery.notes || '';
                document.getElementById('deliveryModalTitle').textContent = 'Редактировать поставку';
                app.openModal('deliveryModal');
            },

            save(e) {
                e.preventDefault();
                const data = {
                    supplier: document.getElementById('deliverySupplier').value,
                    warehouse: document.getElementById('deliveryWarehouse').value,
                    date: document.getElementById('deliveryDate').value,
                    status: document.getElementById('deliveryStatus').value,
                    quantity: parseInt(document.getElementById('deliveryQuantity').value),
                    notes: document.getElementById('deliveryNotes').value
                };

                if (this.currentEditId) {
                    storage.updateDelivery(this.currentEditId, data);
                    app.showToast('Поставка обновлена', 'success');
                } else {
                    storage.addDelivery(data);
                    app.showToast('Поставка добавлена', 'success');
                }

                app.closeModal('deliveryModal');
                this.render();
            },

            deleteDelivery(id) {
                app.confirm('Удалить поставку?', 'Это действие нельзя отменить', () => {
                    storage.deleteDelivery(id);
                    app.showToast('Поставка удалена', 'success');
                    this.render();
                });
            },

            render() {
                const search = document.getElementById('deliverySearch').value.toLowerCase();
                const statusFilter = document.getElementById('statusFilter').value;
                const warehouseFilter = document.getElementById('warehouseFilter').value;

                let deliveries = storage.getDeliveries();

                deliveries = deliveries.filter(d =>
                    (d.supplier.toLowerCase().includes(search) || d.number.includes(search)) &&
                    (!statusFilter || d.status === statusFilter) &&
                    (!warehouseFilter || d.warehouse === warehouseFilter)
                );

                const table = document.getElementById('deliveriesTable');

                if (deliveries.length === 0) {
                    table.innerHTML = '<tr><td colspan="7" class="empty-state">Нет поставок</td></tr>';
                    return;
                }

                table.innerHTML = deliveries.map(d => {
                    let statusClass = '';
                    if (d.status === 'Доставлено') statusClass = 'status-delivered';
                    else if (d.status === 'В пути') statusClass = 'status-transit';
                    else if (d.status === 'Обработка') statusClass = 'status-processing';

                    return `
                        <tr>
                            <td><strong>${d.number}</strong></td>
                            <td>${d.supplier}</td>
                            <td>${d.warehouse}</td>
                            <td>${new Date(d.date).toLocaleDateString('ru-RU')}</td>
                            <td><span class="status-badge ${statusClass}">${d.status}</span></td>
                            <td>${d.quantity}</td>
                            <td class="action-cell">
                                <button class="action-btn" onclick="deliveries.editDelivery('${d.id}')" title="Редактировать">✏️</button>
                                <button class="action-btn danger" onclick="deliveries.deleteDelivery('${d.id}')" title="Удалить">🗑️</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            deliveries.init();
        });
    </script>
</body>
</html>
